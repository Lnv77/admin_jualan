<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catatan Pengeluaran</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 overflow-hidden">
    <div class="flex h-screen bg-gray-200">
        <!-- Sidebar will be loaded here -->
        <div id="sidebar-container"></div>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <header class="flex justify-between items-center p-4 bg-white border-b">
                <div class="flex items-center">
                    <button id="sidebar-toggle" class="text-gray-500 focus:outline-none focus:text-gray-700 md:hidden">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    </button>
                    <h1 id="header-title" class="text-xl font-semibold ml-3">Catatan Pengeluaran</h1>
                </div>
                <div></div>
            </header>
            <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-100 p-6">
                <div class="container mx-auto">
                    <!-- Form Input Pengeluaran -->
                    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-2xl mx-auto">
                        <form id="form-pengeluaran">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label for="tanggal" class="block text-sm font-medium text-gray-700">Tanggal & Waktu</label>
                                    <input type="datetime-local" id="tanggal" name="tanggal" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm" required>
                                </div>
                                <div>
                                    <label for="kategori" class="block text-sm font-medium text-gray-700">Kategori</label>
                                    <select id="kategori" name="kategori" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm" required>
                                        <option value="Makan">Makan</option>
                                        <option value="Stok Barang">Stok Barang</option>
                                        <option value="Operasional">Operasional</option>
                                        <option value="Transportasi">Transportasi</option>
                                        <option value="Gaji">Gaji</option>
                                        <option value="Lainnya">Lainnya</option>
                                    </select>
                                </div>
                                <div>
                                    <label for="jumlah" class="block text-sm font-medium text-gray-700">Jumlah (Rp)</label>
                                    <input type="text" inputmode="numeric" id="jumlah" name="jumlah" placeholder="19.000" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm" required>
                                </div>
                                <div>
                                    <label for="sumber_dana" class="block text-sm font-medium text-gray-700">Sumber Dana</label>
                                    <select id="sumber_dana" name="sumber_dana" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
                                        <option value="Cash">Cash</option>
                                        <option value="DANA">DANA</option>
                                        <option value="GoPay">GoPay</option>
                                        <option value="ShopeePay">ShopeePay</option>
                                        <option value="Agen Pulsa">Agen Pulsa</option>
                                    </select>
                                </div>
                                <div class="md:col-span-2">
                                    <label for="keterangan" class="block text-sm font-medium text-gray-700">Keterangan (Opsional)</label>
                                    <textarea id="keterangan" name="keterangan" rows="2" placeholder="Detail pengeluaran..." class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm"></textarea>
                                </div>
                            </div>
                            <div class="mt-8 flex justify-end">
                                <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded-md focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                                    Simpan Pengeluaran
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
                <!-- Tabel Data Pengeluaran -->
                <div class="container mx-auto mt-8">
                    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-4xl mx-auto">
                        <h2 class="text-xl font-semibold mb-4">Riwayat Pengeluaran</h2>
                        <div class="overflow-x-auto hidden md:block">
                            <table class="min-w-full divide-y divide-gray-200">
                                <thead class="bg-gray-50">
                                    <tr>
                                        <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Tanggal</th>
                                        <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Keterangan</th>
                                        <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Kategori</th>
                                        <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Jumlah</th>
                                        <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Sumber Dana</th>
                                        <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Aksi</th>
                                    </tr>
                                </thead>
                                <tbody id="table-body-pengeluaran" class="bg-white divide-y divide-gray-200">
                                </tbody>
                            </table>
                        </div>
                        <!-- Tampilan Card Mobile -->
                        <div id="card-body-pengeluaran" class="grid grid-cols-1 sm:grid-cols-2 gap-4 md:hidden">
                            <!-- Kartu data akan diisi oleh JavaScript -->
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Modal Edit -->
    <div id="edit-modal" class="fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full z-50 hidden">
        <div class="relative top-10 mx-auto p-5 border w-full max-w-2xl shadow-lg rounded-md bg-white">
            <h3 class="text-lg leading-6 font-medium text-gray-900 mb-4">Edit Pengeluaran</h3>
            <form id="form-edit-pengeluaran">
                <input type="hidden" id="edit-id">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label for="edit-tanggal" class="block text-sm font-medium text-gray-700">Tanggal & Waktu</label>
                        <input type="datetime-local" id="edit-tanggal" name="tanggal" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm" required>
                    </div>
                    <div>
                        <label for="edit-kategori" class="block text-sm font-medium text-gray-700">Kategori</label>
                        <select id="edit-kategori" name="kategori" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm" required>
                            <option value="Stok Barang">Stok Barang</option>
                            <option value="Operasional">Operasional</option>
                            <option value="Transportasi">Transportasi</option>
                            <option value="Gaji">Gaji</option>
                            <option value="Makan">Makan</option>
                            <option value="Lainnya">Lainnya</option>
                        </select>
                    </div>
                    <div>
                        <label for="edit-jumlah" class="block text-sm font-medium text-gray-700">Jumlah (Rp)</label>
                        <input type="text" inputmode="numeric" id="edit-jumlah" name="jumlah" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm" required>
                    </div>
                    <div>
                        <label for="edit-sumber_dana" class="block text-sm font-medium text-gray-700">Sumber Dana</label>
                        <select id="edit-sumber_dana" name="sumber_dana" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
                            <option value="Cash">Cash</option>
                            <option value="DANA">DANA</option>
                            <option value="GoPay">GoPay</option>
                            <option value="ShopeePay">ShopeePay</option>
                            <option value="Agen Pulsa">Agen Pulsa</option>
                        </select>
                    </div>
                    <div class="md:col-span-2">
                        <label for="edit-keterangan" class="block text-sm font-medium text-gray-700">Keterangan (Opsional)</label>
                        <textarea id="edit-keterangan" name="keterangan" rows="2" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm"></textarea>
                    </div>
                </div>
                <div class="mt-6 flex justify-end space-x-3">
                    <button type="button" id="edit-cancel-btn" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-2 px-4 rounded-md">Batal</button>
                    <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded-md">Simpan Perubahan</button>
                </div>
            </form>
        </div>
    </div>

    <script src="main.js" defer></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx59LDYtuFqRh6P0a0xtd3usgDpFxXktJbS_jHzbZiai0tqsm3zTIkJSOSFTY1BtfCeqw/exec';
            const formPengeluaran = document.getElementById('form-pengeluaran');
            const tableBody = document.getElementById('table-body-pengeluaran');
            const cardBody = document.getElementById('card-body-pengeluaran');
            const editModal = document.getElementById('edit-modal');
            const editForm = document.getElementById('form-edit-pengeluaran');
            const editCancelBtn = document.getElementById('edit-cancel-btn');
            let allExpenses = [];

            // Helper functions
            const formatRupiah = (e) => {
                const input = e.target;
                let numericValue = input.value.replace(/\D/g, '');
                if (!numericValue) { input.value = ''; return; }
                input.value = new Intl.NumberFormat('id-ID').format(numericValue);
            };
            const parseRupiah = (value) => parseInt(String(value).replace(/\D/g, ''), 10) || 0;
            const setInitialDateTime = () => {
                const tanggalInput = document.getElementById('tanggal');
                if (tanggalInput) {
                    const now = new Date();
                    now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
                    tanggalInput.value = now.toISOString().slice(0, 16);
                }
            };
            
            document.getElementById('jumlah').addEventListener('input', formatRupiah);
            document.getElementById('edit-jumlah').addEventListener('input', formatRupiah);

            async function sendDataToSheet(action, payload, sheetName) {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'cors',
                    body: JSON.stringify({ action, payload, sheetName })
                });
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                return await response.json();
            }

            // Form submission
            formPengeluaran.addEventListener('submit', async function(e) {
                e.preventDefault();
                const submitButton = formPengeluaran.querySelector('button[type="submit"]');
                submitButton.disabled = true;
                submitButton.textContent = 'Menyimpan...';

                const payload = {
                    id: `exp-${Date.now()}`,
                    tanggal: document.getElementById('tanggal').value,
                    kategori: document.getElementById('kategori').value,
                    jumlah: parseRupiah(document.getElementById('jumlah').value),
                    sumber_dana: document.getElementById('sumber_dana').value,
                    keterangan: document.getElementById('keterangan').value,
                };

                try {
                    const result = await sendDataToSheet('create', payload, 'pengeluaran');
                    if (result.status === 'success') {
                        alert('Pengeluaran berhasil disimpan.');
                        formPengeluaran.reset();
                        setInitialDateTime();
                        loadData();
                    } else {
                        throw new Error(result.message);
                    }
                } catch (error) {
                    alert('Gagal menyimpan: ' + error.message);
                } finally {
                    submitButton.disabled = false;
                    submitButton.textContent = 'Simpan Pengeluaran';
                }
            });

            // Render data
            function renderData(data) {
                tableBody.innerHTML = '';
                cardBody.innerHTML = '';

                if (data.length === 0) {
                    const message = 'Belum ada data pengeluaran.';
                    tableBody.innerHTML = `<tr><td colspan="6" class="text-center py-4">${message}</td></tr>`;
                    cardBody.innerHTML = `<div class="text-center py-4 text-gray-500 col-span-full">${message}</div>`;
                    return;
                }

                data.forEach(item => {
                    const tanggalFormatted = new Date(item.tanggal).toLocaleString('id-ID', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
                    const jumlahFormatted = `Rp ${parseInt(item.jumlah || 0).toLocaleString('id-ID')}`;

                    // Table row
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td class="px-4 py-4 whitespace-nowrap text-sm text-gray-900">${tanggalFormatted}</td>
                        <td class="px-4 py-4 whitespace-nowrap text-sm text-gray-500">${item.keterangan || '-'}</td>
                        <td class="px-4 py-4 whitespace-nowrap text-sm text-gray-500">${item.kategori}</td>
                        <td class="px-4 py-4 whitespace-nowrap text-sm text-gray-500">${jumlahFormatted}</td>
                        <td class="px-4 py-4 whitespace-nowrap text-sm text-gray-500">${item.sumber_dana}</td>
                        <td class="px-4 py-4 whitespace-nowrap text-sm font-medium">
                            <button class="bg-indigo-500 hover:bg-indigo-600 text-white text-xs font-semibold py-1 px-2 rounded-md js-edit-btn" data-id="${item.id}">Edit</button>
                            <button class="bg-red-500 hover:bg-red-600 text-white text-xs font-semibold py-1 px-2 rounded-md js-delete-btn" data-id="${item.id}">Delete</button>
                        </td>
                    `;
                    tableBody.appendChild(row);

                    // Card Mobile
                    const card = document.createElement('div');
                    card.className = 'bg-white border border-gray-200 rounded-lg shadow-sm p-4 flex flex-col justify-between';
                    card.innerHTML = `
                        <div>
                            <div class="flex justify-between items-start">
                                <p class="font-semibold text-gray-800 text-base pr-2">${item.keterangan || 'Pengeluaran'}</p>
                                <span class="text-xs bg-gray-100 text-gray-800 font-medium px-2 py-1 rounded-full whitespace-nowrap">${item.kategori}</span>
                            </div>
                            <p class="text-xs text-gray-500 mt-1">${tanggalFormatted} &bull; ${item.sumber_dana}</p>
                        </div>
                        <div class="mt-3 pt-3 border-t flex justify-between items-center">
                            <span class="text-lg font-bold text-indigo-600">${jumlahFormatted}</span>
                            <div class="flex space-x-1">
                                <button class="bg-indigo-500 hover:bg-indigo-600 text-white text-xs font-semibold py-1 px-2 rounded-md js-edit-btn" data-id="${item.id}">Edit</button>
                                <button class="bg-red-500 hover:bg-red-600 text-white text-xs font-semibold py-1 px-2 rounded-md js-delete-btn" data-id="${item.id}">Delete</button>
                            </div>
                        </div>`;
                    cardBody.appendChild(card);
                });
            }

            // Handle delete
            async function handleActions(e) {
                const target = e.target;
                const id = target.dataset.id;
                if (!id) return;

                if (target.classList.contains('js-delete-btn')) {
                    if (confirm(`Yakin ingin menghapus pengeluaran dengan ID ${id}?`)) {
                        try {
                            target.textContent = 'Menghapus...';
                            target.disabled = true;
                            const result = await sendDataToSheet('delete', { id }, 'pengeluaran');
                            if (result.status === 'success') {
                                alert(result.message);
                                loadData();
                            } else {
                                throw new Error(result.message);
                            }
                        } catch (error) {
                            alert('Gagal menghapus: ' + error.message);
                            target.textContent = 'Delete';
                            target.disabled = false;
                        }
                    }
                }

                if (target.classList.contains('js-edit-btn')) {
                    const expense = allExpenses.find(ex => ex.id == id);
                    if (expense) {
                        // Format tanggal agar sesuai dengan input datetime-local (YYYY-MM-DDTHH:mm)
                        const date = new Date(expense.tanggal);
                        date.setMinutes(date.getMinutes() - date.getTimezoneOffset());
                        const formattedDate = date.toISOString().slice(0, 16);

                        document.getElementById('edit-id').value = expense.id;
                        document.getElementById('edit-tanggal').value = formattedDate;
                        document.getElementById('edit-kategori').value = expense.kategori;
                        document.getElementById('edit-jumlah').value = parseInt(expense.jumlah || 0).toLocaleString('id-ID');
                        document.getElementById('edit-sumber_dana').value = expense.sumber_dana;
                        document.getElementById('edit-keterangan').value = expense.keterangan || '';
                        editModal.classList.remove('hidden');
                    }
                }
            }

            tableBody.addEventListener('click', handleActions);
            cardBody.addEventListener('click', handleActions);
            editCancelBtn.addEventListener('click', () => editModal.classList.add('hidden'));

            editForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                const submitButton = editForm.querySelector('button[type="submit"]');
                submitButton.disabled = true;
                submitButton.textContent = 'Menyimpan...';

                const payload = {
                    id: document.getElementById('edit-id').value,
                    tanggal: document.getElementById('edit-tanggal').value,
                    kategori: document.getElementById('edit-kategori').value,
                    jumlah: parseRupiah(document.getElementById('edit-jumlah').value),
                    sumber_dana: document.getElementById('edit-sumber_dana').value,
                    keterangan: document.getElementById('edit-keterangan').value,
                };

                try {
                    const result = await sendDataToSheet('update', payload, 'pengeluaran');
                    if (result.status === 'success') {
                        editModal.classList.add('hidden');
                        alert('Pengeluaran berhasil diperbarui.');
                        loadData();
                    } else {
                        throw new Error(result.message);
                    }
                } catch (error) {
                    alert('Gagal memperbarui data: ' + error.message);
                } finally {
                    submitButton.disabled = false;
                    submitButton.textContent = 'Simpan Perubahan';
                }
            });

            // Load data from sheet
            async function loadData() {
                tableBody.innerHTML = `<tr><td colspan="6" class="text-center py-4">Memuat data...</td></tr>`;
                cardBody.innerHTML = `<div class="text-center py-4 text-gray-500 col-span-full">Memuat data...</div>`;
                try {
                    const result = await sendDataToSheet('read', {}, 'pengeluaran');
                    if (result.status === 'success' && Array.isArray(result.data)) {
                        // Bersihkan data string (hapus spasi/kutip) sebelum disimpan
                        const cleanString = (str) => (typeof str === 'string' ? str.trim().replace(/^"|"$/g, '') : str);
                        
                        allExpenses = result.data.map(item => ({
                            ...item,
                            kategori: cleanString(item.kategori),
                            sumber_dana: cleanString(item.sumber_dana),
                            keterangan: cleanString(item.keterangan)
                        })).reverse(); // Tampilkan yang terbaru dulu
                        renderData(allExpenses);
                    } else {
                        throw new Error(result.message || 'Data tidak valid');
                    }
                } catch (error) {
                    const message = "Gagal memuat data. Coba muat ulang halaman.";
                    tableBody.innerHTML = `<tr><td colspan="6" class="text-center py-4 text-red-500">${message}</td></tr>`;
                    cardBody.innerHTML = `<div class="text-center py-4 text-red-500 col-span-full">${message}</div>`;
                }
            }

            // Initial calls
            setInitialDateTime();
            loadData();
        });
    </script>
</body>
</html>
